name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Replace environment variables
        run: |
          # Loop through all environment files (environment.ts, environment.prod.ts, etc.)
          for file in src/environments/environment*.ts; do
            if [ -f "$file" ]; then
              # Use '#' as delimiter to avoid issues with special characters like '/' in keys
              sed -i 's#${FIREBASE_API_KEY}#${{ secrets.FIREBASE_API_KEY }}#g' "$file"
              sed -i 's#${FIREBASE_AUTH_DOMAIN}#${{ vars.FIREBASE_AUTH_DOMAIN }}#g' "$file"
              sed -i 's#${FIREBASE_PROJECT_ID}#${{ vars.FIREBASE_PROJECT_ID }}#g' "$file"
              sed -i 's#${FIREBASE_STORAGE_BUCKET}#${{ vars.FIREBASE_STORAGE_BUCKET }}#g' "$file"
              sed -i 's#${FIREBASE_MESSAGING_SENDER_ID}#${{ vars.FIREBASE_MESSAGING_SENDER_ID }}#g' "$file"
              sed -i 's#${FIREBASE_APP_ID}#${{ vars.FIREBASE_APP_ID }}#g' "$file"
            fi
          done

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/expert-giggle/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4